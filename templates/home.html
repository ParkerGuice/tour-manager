<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            padding: 15px 60px;
            font-size: 1.2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <h1 class="display-4 fw-bold text-white mb-3">🎵 Explore Live Music 🎵</h1>
        <p class="text-white-50 fs-5 mb-2">See which of your favorite artists are touring</p>
        <p class="text-white-50 mb-5">Keep track of shows, dates, and see it on a map</p>
        <a href="/login" class="login-btn">Login →</a>
        <br><br>
        <a href="/register" class="text-white-50 small">Don't have an account? Register here</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
