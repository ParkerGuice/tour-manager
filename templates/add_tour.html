<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Artist / Tour - Tour Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 Tour Manager</a>
            <a href="/dashboard" class="btn btn-outline-light">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm" style="border:none; border-radius:15px;">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Add Artist / Tour</h4>
                        <p class="text-muted mb-4">Create a new tour folder for an artist</p>

                        <form method="POST" action="/add_tour">

                            <div class="mb-3">
                                <label class="form-label">Artist Name</label>
                                <input type="text" name="artist_name" class="form-control" placeholder="e.g. Rick Devens" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="3" placeholder="Brief description of the tour..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Create Tour</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
