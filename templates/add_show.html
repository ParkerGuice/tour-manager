<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Show - {{ tour.artist_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎵 Tour Manager</a>
            <a href="/tour/{{ tour.id }}" class="btn btn-outline-light">← Back to {{ tour.artist_name }}</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm" style="border:none; border-radius:15px;">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1">Add a Show</h4>
                        <p class="text-muted mb-4">Adding to: <strong>{{ tour.artist_name }}</strong></p>

                        <form method="POST" action="/tour/{{ tour.id }}/add_show">

                            <div class="mb-3">
                                <label class="form-label">Venue</label>
                                <input type="text" name="venue" class="form-control" placeholder="e.g. Ryman Auditorium" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">City</label>
                                <input type="text" name="city" class="form-control" placeholder="e.g. Nashville, TN" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Country</label>
                                <input type="text" name="country" class="form-control" placeholder="e.g. USA" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Time</label>
                                <input type="time" name="time" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Capacity</label>
                                <input type="number" name="capacity" class="form-control" placeholder="e.g. 500" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Notes</label>
                                <textarea name="notes" class="form-control" rows="3" placeholder="Any additional info..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Add Show</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
